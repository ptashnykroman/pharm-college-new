query GetCmsPagePaths($page: Int!, $pageSize: Int!) {
  pages(sort: ["page_url:asc"], pagination: { page: $page, pageSize: $pageSize }) {
    meta {
      pagination {
        total
        page
        pageSize
        pageCount
      }
    }
    data {
      id
      attributes {
        page_url
        publishedAt
        updatedAt
      }
    }
  }
}

query GetPageSeo($pageUrl: String!) {
  pages(filters: { page_url: { eq: $pageUrl } }, pagination: { pageSize: 1 }) {
    data {
      id
      attributes {
        title
        page_url
        SEO {
          title
          description
          meta {
            id
            name
            content
          }
        }
      }
    }
  }
}

fragment PageAccordionFields on ComponentPageBlocksAccordion {
  id
  title
  body
  default_open
  component_type
}

fragment PageBodyFields on ComponentPageBlocksBody {
  id
  body
  component_type
}

fragment PageButtonImagesFields on ComponentPageBlocksButtonImages {
  id
  component_type
  Components {
    id
    link
    image {
      ...MediaFileFields
    }
  }
}

fragment PageButtonLinkFields on ComponentPageBlocksButtonLink {
  id
  text
  link
  component_type
}

fragment PageEducationBooksFields on ComponentPageBlocksEducationBooks {
  id
  description
  component_type
  add_container
  main_photo {
    ...MediaFileFields
  }
  authors {
    ...PageAccordionFields
  }
}

fragment PagePanoramasFields on ComponentPageBlocksPanorams {
  id
  title
  component_type
  panoramas(pagination: { pageSize: 30 }) {
    data {
      id
      attributes {
        title
        link
        poster {
          ...MediaFileFields
        }
        weight
      }
    }
  }
  withBackground
}

fragment PagePartnersBlockFields on ComponentPageBlocksPartnersBlock {
  id
  component_type
  title
  partners(sort: ["weight:desc", "name:asc"], pagination: { pageSize: 100 }) {
    data {
      id
      attributes {
        name
        logo {
          ...MediaFileFields
        }
        link
        presentation_link
        type
        weight
      }
    }
  }
}

fragment PagePhotosGalleryFields on ComponentPageBlocksPhotosGallery {
  id
  title
  component_type
  images(pagination: { pageSize: 30 }) {
    data {
      ...MediaFileListItemFields
    }
  }
}

fragment PageTwoColumnWithImageFields on ComponentPageBlocksTwoColumnWithImage {
  id
  body
  component_type
  image {
    ...MediaFileFields
  }
  layout
}

fragment PagePersonFields on ComponentPageBlocksPerson {
  id
  component_type
  worker {
    data {
      id
      attributes {
        name
        photo {
          ...MediaFileFields
        }
        position
        email
        phone
        slug
        cycle_commission {
          data {
            attributes {
              slug
            }
          }
        }
      }
    }
  }
}

fragment PageCardsFields on ComponentPageBlocksPageCards {
  id
  component_type
  cards {
    id
    name
    photo {
      ...MediaFileFields
    }
    link
  }
}

fragment PageFullSizePersonFields on ComponentPageBlocksFullSizePerson {
  id
  component_type
  name
  body
  photo {
    ...MediaFileFields
  }
}

fragment PageFrameFields on ComponentPageBlocksFrame {
  id
  component_type
  Frame
}

query GetPageByPath($pageUrl: String!) {
  pages(filters: { page_url: { eq: $pageUrl } }, pagination: { pageSize: 1 }) {
    data {
      id
      attributes {
        title
        page_url
        layout
        SEO {
          title
          description
          meta {
            id
            name
            content
          }
        }
        main_photo {
          ...MediaFileFields
        }
        page_components {
          ...PageAccordionFields
          ...PageBodyFields
          ...PageButtonImagesFields
          ...PageButtonLinkFields
          ...PageEducationBooksFields
          ...PagePanoramasFields
          ...PagePartnersBlockFields
          ...PagePhotosGalleryFields
          ...PageTwoColumnWithImageFields
          ...PagePersonFields
          ...PageCardsFields
          ...PageFullSizePersonFields
          ...PageFrameFields
        }
        right_sidebar {
          ...PageAccordionFields
          ...PageBodyFields
          ...PageButtonImagesFields
          ...PageButtonLinkFields
          ...PageEducationBooksFields
          ...PagePanoramasFields
          ...PagePartnersBlockFields
          ...PagePhotosGalleryFields
          ...PageTwoColumnWithImageFields
          ...PagePersonFields
          ...PageCardsFields
          ...PageFullSizePersonFields
          ...PageFrameFields
        }
        left_sidebar {
          ...PageAccordionFields
          ...PageBodyFields
          ...PageButtonImagesFields
          ...PageButtonLinkFields
          ...PageEducationBooksFields
          ...PagePanoramasFields
          ...PagePartnersBlockFields
          ...PagePhotosGalleryFields
          ...PageTwoColumnWithImageFields
          ...PagePersonFields
          ...PageCardsFields
          ...PageFullSizePersonFields
          ...PageFrameFields
        }
      }
    }
  }
}
